name: Daily Scrape & OCR Pipeline

on:
  schedule:
    # Run daily at 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  actions: write
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -c "
          from scheduler.runner import run_pipeline
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(name)s: %(message)s')
          run_pipeline()
          "

      - name: Keepalive (prevent 60-day auto-disable)
        if: github.event_name == 'schedule'
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          # Re-commits when the latest commit is older than this, keeping the
          # repo under GitHub's 60-day inactivity limit for scheduled workflows.
          time_elapsed: "45"
